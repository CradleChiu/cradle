name: Soul Forging

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  forge-soul:
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.issue.title, '[soul-forging]') ||
      contains(github.event.issue.title, '[soul-review]') ||
      contains(github.event.issue.title, '[soul-evolution]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Handle Request
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/handle-request.js
